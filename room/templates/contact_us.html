{% include 'navigation.html' %}

<div class="container">
  <div class="card-box">
    <div class="title">Contact the support desk</div>
    <p class="text-muted mb-4">Share your query and the team will review it from the admin console.</p>

    <form method="post">
      {% csrf_token %}
      <div class="mb-3">
        <label>Full Name</label>
        <input type="text" class="form-control" name="fname" placeholder="Enter your full name" required />
      </div>
      <div class="mb-3">
        <label>Email</label>
        <input type="email" class="form-control" name="email" placeholder="Enter your email" required />
      </div>
      <div class="mb-3">
        <label>Mobile</label>
        <input type="tel" class="form-control" name="mobile" placeholder="Enter your contact number" pattern="[6-9]{1}[0-9]{9}" maxlength="10" required />
      </div>
      <div class="mb-3">
        <label>Purpose</label>
        <input type="text" class="form-control" name="purpose" placeholder="Booking help, destination query, or general support" required />
      </div>
      <div class="text-center mt-4">
        <input type="submit" value="Submit Request" class="btn btn-primary btn-submit" />
      </div>
    </form>
  </div>
</div>

{% if error == "no" %}
<script>
  alert("Contact Detail Submitted Successfully")
  window.location = ('{% url 'contact_us' %}')
</script>
{% endif %} {% if error == "yes" %}
<script>
  alert("Something went wrong. Please try again.");
</script>
{% endif %}

{% include 'footer.html' %}
