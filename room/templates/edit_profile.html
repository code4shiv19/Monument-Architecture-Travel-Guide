{% include 'user_navigation.html' %}

<div class="container">
  <div class="profile-card">
    <div class="title">Edit profile</div>
    <p class="text-muted mb-4">Keep your contact details current for booking updates and support calls.</p>

    <form onsubmit="return checkpass();" name="signup" method="post" enctype="multipart/form-data">
      {% csrf_token %}

      <div class="text-center mb-4">
        <img src="{{data2.image.url}}" class="profile-img" alt="Profile photo" />
      </div>

      <div class="row mb-3">
        <div class="col-md-6">
          <label>First Name</label>
          <input type="text" class="form-control" name="fname" value="{{request.user.first_name}}" required />
        </div>
        <div class="col-md-6">
          <label>Last Name</label>
          <input type="text" class="form-control" name="lname" value="{{request.user.last_name}}" />
        </div>
      </div>

      <div class="mb-3">
        <label>Email ID</label>
        <input type="email" class="form-control" name="email" value="{{request.user.username}}" readonly />
      </div>

      <div class="row mb-3">
        <div class="col-md-6">
          <label>Contact Number</label>
          <input type="tel" class="form-control" name="contact" value="{{data2.mobile}}" pattern="[6-9]{1}[0-9]{9}" maxlength="10" required />
        </div>
        <div class="col-md-6">
          <label>Change Profile Picture</label>
          <input type="file" class="form-control" name="image" />
        </div>
      </div>

      <div class="row mb-3">
        <div class="col-md-6">
          <label>Gender</label>
          <div class="radio-box">
            <div class="form-check form-check-inline">
              <input class="form-check-input" type="radio" name="gender" value="Male" {% if data2.gender == "Male" %}checked{% endif %} />
              <label class="form-check-label">Male</label>
            </div>
            <div class="form-check form-check-inline">
              <input class="form-check-input" type="radio" name="gender" value="Female" {% if data2.gender == "Female" %}checked{% endif %} />
              <label class="form-check-label">Female</label>
            </div>
          </div>
        </div>
        <div class="col-md-6">
          <label>Date of Birth</label>
          <input type="text" class="form-control" name="dob" value="{{data2.dob}}" required />
        </div>
      </div>

      <div class="text-center mt-4">
        <input type="submit" value="Update Profile" class="btn btn-primary btn-submit" />
        <a href="{% url 'user_home' %}" class="btn btn-dark btn-cancel">Cancel</a>
      </div>
    </form>
  </div>
</div>

{% if error == "no" %}
<script>
  alert("Profile Updated Successfully")
  window.location = ('{% url 'user_home' %}')
</script>
{% endif %} {% if error == "yes" %}
<script>
  alert("Something went wrong. Please try again.");
</script>
{% endif %}

{% include 'footer.html' %}
