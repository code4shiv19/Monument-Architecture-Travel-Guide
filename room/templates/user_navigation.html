<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Monument & Achitecture Travel Guide</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.1/css/all.min.css"
      rel="stylesheet"
    />
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/theme.css' %}" />
  </head>
  <body>
    <div class="top-bar">
      <div class="container d-flex justify-content-between align-items-center">
        <div class="d-flex align-items-center">
          <img
            src="{% static 'images/b4.jpg' %}"
            class="logo-img me-3"
            alt="Monument & Achitecture Travel Guide"
          />
          <div>
            <span class="site-title">Monument & Architecture Travel Guide</span>
            <small class="d-block text-white-50"
              >Plan, book, and track your monument visits</small
            >
          </div>
        </div>
        <div class="social-icons">
          <a href="https://web.whatsapp.com/" target="_blank" title="WhatsApp"
            ><i class="fab fa-whatsapp"></i
          ></a>
          <a href="https://www.instagram.com/" target="_blank" title="Instagram"
            ><i class="fab fa-instagram"></i
          ></a>
          <a href="https://www.facebook.com/" target="_blank" title="Facebook"
            ><i class="fab fa-facebook"></i
          ></a>
        </div>
      </div>
    </div>

    <nav class="navbar navbar-expand-lg navbar-custom">
      <div class="container">
        <a class="navbar-brand" href="{% url 'user_home' %}">Traveler Portal</a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarNav"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div
          class="collapse navbar-collapse justify-content-end"
          id="navbarNav"
        >
          <ul class="navbar-nav align-items-center">
            <li class="nav-item">
              <a class="nav-link" href="{% url 'user_home' %}">Home</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="{% url 'view_room_user' %}"
                >Monuments</a
              >
            </li>
            <li class="nav-item">
              <a class="nav-link" href="{% url 'user_booking' %}"
                >My Bookings</a
              >
            </li>
            <li class="nav-item">
              <a class="nav-link" href="{% url 'change_password_user' %}"
                >Password</a
              >
            </li>
            <li class="nav-item">
              <a
                class="nav-link"
                href="{% url 'edit_profile' %}"
                title="Edit Profile"
                ><i class="fa-solid fa-user-pen"></i
              ></a>
            </li>
            <li class="nav-item">
              <a class="nav-link text-danger" href="{% url 'logout' %}"
                ><i class="fa fa-sign-out-alt"></i> Logout</a
              >
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
